---
# yamllint disable rule:truthy
name: Build Book

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  BOOK_DIR: 1st-ed
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-book:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.BOOK_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            yq \
            texlive-xetex \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            librsvg2-bin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material

      - name: Ensure scripts are executable
        run: |
          test -f build/scripts/build-book.sh
          test -f build/scripts/build-pdf.sh
          test -f build/scripts/build-epub.sh
          test -f build/scripts/build-web.sh
          chmod +x build/scripts/*.sh

      - name: Build book
        run: ./build/scripts/build-book.sh

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-pdf
          path: 1st-ed/output/pdf/

      - name: Upload EPUB artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-epub
          path: 1st-ed/output/epub/

      - name: Upload website artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-website
          path: 1st-ed/output/website/
