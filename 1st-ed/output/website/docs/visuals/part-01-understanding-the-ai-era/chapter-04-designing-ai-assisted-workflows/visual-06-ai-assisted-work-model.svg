<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title>Diagram</title>
<desc>Book visual diagram</desc>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L12,6 L0,12 z" fill="#1F3A5F"/>
  </marker>
  <style>
    .title { font-family: Inter, Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #1F3A5F; }
    .label { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #333333; }
    .small { font-family: Inter, Arial, sans-serif; font-size: 16px; fill: #333333; }
    .step { fill: #F7F7F7; stroke: #1F3A5F; stroke-width: 3; rx: 22; ry: 22; }
    .step2 { fill: #EAF7F8; stroke: #2FA4A9; stroke-width: 3; rx: 22; ry: 22; }
    .output { fill: #EEF8EB; stroke: #6BBF59; stroke-width: 3; }
    .circle { fill: #2FA4A9; stroke: none; }
    .line { stroke: #1F3A5F; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .connector { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); opacity: .8; }
    .muted { fill: #E5E5E5; stroke: #1F3A5F; stroke-width: 2; rx: 18; ry: 18; }
  </style>
</defs>
<text x="800" y="70" text-anchor="middle" class="title">AI-Assisted Work Model</text><rect x="120" y="320" width="260" height="150" fill="#F7F7F7" stroke="#1F3A5F" stroke-width="3" rx="24" ry="24"/><circle cx="175" cy="365" r="22" class="circle"/><path d="M165 363 h20 M165 371 h16 M165 355 h14" stroke="white" stroke-width="3" stroke-linecap="round"/><text x="250.0" y="398" text-anchor="middle" class="label">Task</text><text x="250.0" y="432" text-anchor="middle" class="small">Start with the work</text><rect x="470" y="320" width="260" height="150" fill="#EAF7F8" stroke="#2FA4A9" stroke-width="3" rx="24" ry="24"/><circle cx="525" cy="365" r="22" class="circle"/><path d="M515 373 l10-22 l10 22 z M525 356 v13" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="600.0" y="398" text-anchor="middle" class="label">AI Draft</text><text x="600.0" y="432" text-anchor="middle" class="small">Generate a first pass</text><rect x="820" y="320" width="260" height="150" fill="#F7F7F7" stroke="#1F3A5F" stroke-width="3" rx="24" ry="24"/><circle cx="875" cy="365" r="22" class="circle"/><circle cx="871" cy="363" r="6" fill="none" stroke="white" stroke-width="3"/><path d="M877 369 l8 8" stroke="white" stroke-width="3" stroke-linecap="round"/><text x="950.0" y="398" text-anchor="middle" class="label">Human Review</text><text x="950.0" y="432" text-anchor="middle" class="small">Check judgment and fit</text><rect x="1170" y="320" width="260" height="150" fill="#EEF8EB" stroke="#6BBF59" stroke-width="3" rx="8" ry="8"/><circle cx="1225" cy="365" r="22" class="circle"/><path d="M1215 365 l8 8 l14-16" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="1300.0" y="398" text-anchor="middle" class="label">Final Output</text><text x="1300.0" y="432" text-anchor="middle" class="small">Send or deliver</text><line x1="380" y1="395" x2="458" y2="395" class="line"/><line x1="730" y1="395" x2="808" y2="395" class="line"/><line x1="1080" y1="395" x2="1158" y2="395" class="line"/><rect x="420" y="170" width="760" height="80" fill="#E5E5E5" stroke="#1F3A5F" stroke-width="2" rx="18" ry="18"/><text x="800" y="220" text-anchor="middle" style="font-family: Inter, Arial, sans-serif; font-size: 21px; font-weight:700; fill:#1F3A5F;">Human Judgment stays in the loop</text><text x="800" y="760" text-anchor="middle" class="small">AI removes drafting friction. The human owns review, direction, and the final decision.</text></svg>