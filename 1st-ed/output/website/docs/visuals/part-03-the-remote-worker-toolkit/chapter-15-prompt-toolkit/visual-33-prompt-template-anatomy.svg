<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3A5F"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .label { font-size: 18px; font-weight: 600; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
      .box { stroke: #1F3A5F; stroke-width: 2; }
      .arrow { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
      .icon-circle { fill: #2FA4A9; }
      .muted { fill: #F7F7F7; }
    </style>
  </defs>
<text x="800" y="56" text-anchor="middle" class="title">
<tspan x="800" dy="0">Prompt Template Anatomy</tspan>
</text>
<text x="800" y="90" text-anchor="middle" class="body">
<tspan x="800" dy="0">A reusable prompt is easier to adapt when its parts are visible and intentional.</tspan>
</text>
<circle cx="260" cy="220" r="34" fill="#2FA4A9" /><text x="260" y="228" text-anchor="middle" class="label">
<tspan x="260" dy="0">1</tspan>
</text><rect x="90" y="290" width="340" height="220" rx="24" fill="#FFFFFF" class="box"/><text x="260" y="360" text-anchor="middle" class="label">
<tspan x="260" dy="0">Purpose</tspan>
</text><text x="260" y="430" text-anchor="middle" class="body">
<tspan x="260" dy="0">What outcome do you</tspan>
<tspan x="260" dy="1.3em">want?</tspan>
</text><line x1="430" y1="400" x2="510" y2="400" class="arrow"/><circle cx="600" cy="220" r="34" fill="#2FA4A9" /><text x="600" y="228" text-anchor="middle" class="label">
<tspan x="600" dy="0">2</tspan>
</text><rect x="430" y="290" width="340" height="220" rx="24" fill="#EAF6F6" class="box"/><text x="600" y="360" text-anchor="middle" class="label">
<tspan x="600" dy="0">Prompt text</tspan>
</text><text x="600" y="430" text-anchor="middle" class="body">
<tspan x="600" dy="0">The main instruction</tspan>
</text><line x1="770" y1="400" x2="850" y2="400" class="arrow"/><circle cx="940" cy="220" r="34" fill="#2FA4A9" /><text x="940" y="228" text-anchor="middle" class="label">
<tspan x="940" dy="0">3</tspan>
</text><rect x="770" y="290" width="340" height="220" rx="24" fill="#F5FBF2" class="box"/><text x="940" y="360" text-anchor="middle" class="label">
<tspan x="940" dy="0">Variables</tspan>
</text><text x="940" y="430" text-anchor="middle" class="body">
<tspan x="940" dy="0">Details you swap in and</tspan>
<tspan x="940" dy="1.3em">out</tspan>
</text><line x1="1110" y1="400" x2="1190" y2="400" class="arrow"/><circle cx="1280" cy="220" r="34" fill="#2FA4A9" /><text x="1280" y="228" text-anchor="middle" class="label">
<tspan x="1280" dy="0">4</tspan>
</text><rect x="1110" y="290" width="340" height="220" rx="24" fill="#F7F7F7" class="box"/><text x="1280" y="360" text-anchor="middle" class="label">
<tspan x="1280" dy="0">Review reminder</tspan>
</text><text x="1280" y="430" text-anchor="middle" class="body">
<tspan x="1280" dy="0">Check accuracy, tone,</tspan>
<tspan x="1280" dy="1.3em">and fit</tspan>
</text></svg>
