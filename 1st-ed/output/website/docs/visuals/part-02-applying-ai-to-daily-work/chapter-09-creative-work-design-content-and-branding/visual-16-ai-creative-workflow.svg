<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="700" viewBox="0 0 1600 700">

<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L12,6 L0,12 z" fill="#1F3A5F" />
  </marker>
  <style>
    .title { font: 700 24px Inter, Arial, sans-serif; fill: #1F3A5F; }
    .label { font: 18px Inter, Arial, sans-serif; fill: #333333; }
    .small { font: 16px Inter, Arial, sans-serif; fill: #333333; }
    .step { fill: #F7F7F7; stroke: #1F3A5F; stroke-width: 2; rx: 18; ry: 18; }
    .accent { fill: #EAF6EA; stroke: #1F3A5F; stroke-width: 2; rx: 18; ry: 18; }
    .teal { fill: #EAF7F7; stroke: #1F3A5F; stroke-width: 2; rx: 18; ry: 18; }
    .panel { fill: #F7F7F7; stroke: #1F3A5F; stroke-width: 2; rx: 16; ry: 16; }
    .line { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .rule { stroke: #1F3A5F; stroke-width: 2; }
    .dot { fill: #2FA4A9; stroke: #1F3A5F; stroke-width: 2; }
  </style>
</defs>

<text x="800" y="70" text-anchor="middle" class="title">AI Creative Workflow</text>
<rect x="90" y="260" width="220" height="100" class="step"/>
<rect x="390" y="260" width="220" height="100" class="teal"/>
<rect x="690" y="260" width="220" height="100" class="step"/>
<rect x="990" y="260" width="220" height="100" class="teal"/>
<rect x="1290" y="260" width="220" height="100" class="accent"/>
<text x="200" y="320" text-anchor="middle" class="label">Idea</text>
<text x="500" y="310" text-anchor="middle" class="label">AI Concepts</text>
<text x="500" y="338" text-anchor="middle" class="small">options and directions</text>
<text x="800" y="310" text-anchor="middle" class="label">Human Selection</text>
<text x="800" y="338" text-anchor="middle" class="small">taste and judgment</text>
<text x="1100" y="310" text-anchor="middle" class="label">Refinement</text>
<text x="1100" y="338" text-anchor="middle" class="small">iterate and polish</text>
<text x="1400" y="310" text-anchor="middle" class="label">Final Asset</text>
<text x="1400" y="338" text-anchor="middle" class="small">usable creative output</text>
<line x1="310" y1="310" x2="390" y2="310" class="line"/>
<line x1="610" y1="310" x2="690" y2="310" class="line"/>
<line x1="910" y1="310" x2="990" y2="310" class="line"/>
<line x1="1210" y1="310" x2="1290" y2="310" class="line"/>
<text x="800" y="470" text-anchor="middle" class="small">AI expands options. Human taste decides what is worth keeping.</text>
</svg>