<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3A5F"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .label { font-size: 18px; font-weight: 600; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
      .box { stroke: #1F3A5F; stroke-width: 2; }
      .arrow { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
      .icon-circle { fill: #2FA4A9; }
      .muted { fill: #F7F7F7; }
    </style>
  </defs>
<text x="800" y="56" text-anchor="middle" class="title">
<tspan x="800" dy="0">T-Shaped Skills in the AI Era</tspan>
</text>
<text x="800" y="90" text-anchor="middle" class="body">
<tspan x="800" dy="0">Broad AI fluency is most valuable when it is combined with deep expertise in a</tspan>
<tspan x="800" dy="1.3em">domain that matters.</tspan>
</text>
<rect x="260" y="220" width="1080" height="120" rx="28" fill="#EAF6F6" class="box"/><text x="800" y="290" text-anchor="middle" class="label">
<tspan x="800" dy="0">Broad AI fluency</tspan>
</text><text x="800" y="328" text-anchor="middle" class="body">
<tspan x="800" dy="0">prompting • tool awareness • workflow design • review habits</tspan>
</text><rect x="650" y="340" width="300" height="380" rx="28" fill="#F5FBF2" class="box"/><text x="800" y="455" text-anchor="middle" class="label">
<tspan x="800" dy="0">Deep domain</tspan>
<tspan x="800" dy="1.3em">expertise</tspan>
</text><text x="800" y="535" text-anchor="middle" class="body">
<tspan x="800" dy="0">industry context</tspan>
<tspan x="800" dy="1.3em">judgment</tspan>
<tspan x="800" dy="1.3em">standards</tspan>
<tspan x="800" dy="1.3em">relationships</tspan>
</text></svg>
