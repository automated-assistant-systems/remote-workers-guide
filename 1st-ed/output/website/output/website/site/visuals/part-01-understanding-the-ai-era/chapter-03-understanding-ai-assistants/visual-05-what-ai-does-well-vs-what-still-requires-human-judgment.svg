<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="v5title v5desc">
  <title id="v5title">What AI Does Well vs What Still Requires Human Judgment</title>
  <desc id="v5desc">Two-column comparison showing tasks AI handles well, such as drafting and summarizing, contrasted with areas where humans remain essential, such as judgment, verification, strategy, context, and relationship nuance.</desc>
  <defs>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 30px; font-weight: 700; fill: #1F3A5F; }
      .subtitle { font-size: 19px; font-weight: 600; fill: #1F3A5F; }
      .paneltitle { font-size: 28px; font-weight: 700; }
      .item { font-size: 22px; font-weight: 700; }
      .sub { font-size: 18px; }
      .small { font-size: 17px; font-weight: 600; }
      .white { fill: white; }
      .muted { fill: #1F3A5F; opacity: 0.82; }
    </style>
    <marker id="arrow5" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#1F3A5F"/>
    </marker>
  </defs>

  <rect x="60" y="60" width="1480" height="780" rx="30" fill="#F7F7F7" stroke="#1F3A5F" stroke-width="3"/>

  <text x="800" y="120" text-anchor="middle" class="title">Practical expectations for AI assistants</text>
  <text x="800" y="155" text-anchor="middle" class="subtitle">Use AI for speed and structure. Keep humans in the loop for judgment and accountability.</text>

  <!-- Panels -->
  <rect x="110" y="210" width="620" height="510" rx="28" fill="white" stroke="#1F3A5F" stroke-width="3"/>
  <rect x="870" y="210" width="620" height="510" rx="28" fill="white" stroke="#1F3A5F" stroke-width="3"/>
  <line x1="800" y1="210" x2="800" y2="720" stroke="#E5E5E5" stroke-width="6"/>

  <!-- Left header -->
  <rect x="145" y="242" width="550" height="78" rx="22" fill="#2FA4A9"/>
  <text x="420" y="290" text-anchor="middle" class="paneltitle white">AI does well</text>

  <!-- Right header -->
  <rect x="905" y="242" width="550" height="78" rx="22" fill="#6BBF59"/>
  <text x="1180" y="290" text-anchor="middle" class="paneltitle white">Human judgment remains essential</text>

  <!-- Left column items -->
  <g transform="translate(145 350)">
    <circle cx="50" cy="44" r="34" fill="#2FA4A9"/>
    <path d="M34 44 h32" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <path d="M34 56 h24" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <text x="105" y="38" class="item">Drafting</text>
    <text x="105" y="66" class="sub">first passes for emails, reports, notes, and outlines</text>

    <circle cx="50" cy="154" r="34" fill="#2FA4A9"/>
    <path d="M34 144 h32 M34 156 h32 M34 168 h22" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <text x="105" y="148" class="item">Summarizing</text>
    <text x="105" y="176" class="sub">compressing long text into faster, usable overviews</text>

    <circle cx="50" cy="264" r="34" fill="#2FA4A9"/>
    <rect x="34" y="246" width="32" height="36" rx="6" fill="white"/>
    <path d="M42 256 h16 M42 268 h16 M42 280 h12" stroke="#2FA4A9" stroke-width="4" stroke-linecap="round"/>
    <text x="105" y="258" class="item">Structuring</text>
    <text x="105" y="286" class="sub">organizing ideas into lists, sections, and workflows</text>

    <circle cx="50" cy="374" r="34" fill="#2FA4A9"/>
    <path d="M44 386 l12 -12 10 10 12 -20" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="105" y="368" class="item">Brainstorming</text>
    <text x="105" y="396" class="sub">generating options, angles, prompts, and starting points</text>

    <circle cx="50" cy="484" r="34" fill="#2FA4A9"/>
    <path d="M34 468 h32 v12 h-20 l-12 12 z" fill="white"/>
    <text x="105" y="478" class="item">Transforming content</text>
    <text x="105" y="506" class="sub">rewriting, reformatting, adapting tone, and repurposing</text>
  </g>

  <!-- Right column items -->
  <g transform="translate(905 350)">
    <circle cx="50" cy="44" r="34" fill="#6BBF59"/>
    <path d="M38 45 l10 10 18 -22" stroke="white" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="105" y="38" class="item">Judgment</text>
    <text x="105" y="66" class="sub">deciding what matters, what fits, and what should happen next</text>

    <circle cx="50" cy="154" r="34" fill="#6BBF59"/>
    <circle cx="50" cy="150" r="10" fill="white"/>
    <path d="M36 164 q14 14 28 0" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
    <text x="105" y="148" class="item">Verification</text>
    <text x="105" y="176" class="sub">checking facts, sources, accuracy, and implications</text>

    <circle cx="50" cy="264" r="34" fill="#6BBF59"/>
    <path d="M34 266 h32 M50 250 v32" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <text x="105" y="258" class="item">Strategic decision-making</text>
    <text x="105" y="286" class="sub">setting priorities, tradeoffs, direction, and timing</text>

    <circle cx="50" cy="374" r="34" fill="#6BBF59"/>
    <path d="M32 386 q18 -28 36 0" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="42" cy="366" r="5" fill="white"/>
    <circle cx="58" cy="366" r="5" fill="white"/>
    <text x="105" y="368" class="item">Contextual awareness</text>
    <text x="105" y="396" class="sub">reading nuance, constraints, history, and audience realities</text>

    <circle cx="50" cy="484" r="34" fill="#6BBF59"/>
    <circle cx="40" cy="474" r="8" fill="white"/>
    <circle cx="60" cy="474" r="8" fill="white"/>
    <path d="M32 496 q18 -18 36 0" stroke="white" stroke-width="6" fill="none" stroke-linecap="round"/>
    <text x="105" y="478" class="item">Relationship nuance</text>
    <text x="105" y="506" class="sub">tone, trust, empathy, and human stakes in communication</text>
  </g>

  <!-- center guide -->
  <g>
    <rect x="720" y="350" width="160" height="230" rx="24" fill="#E5E5E5" stroke="#1F3A5F" stroke-width="2"/>
    <text x="800" y="408" text-anchor="middle" class="small">Best model</text>
    <text x="800" y="438" text-anchor="middle" class="small">AI assists</text>
    <line x1="760" y1="468" x2="840" y2="468" stroke="#1F3A5F" stroke-width="4" marker-end="url(#arrow5)"/>
    <text x="800" y="514" text-anchor="middle" class="small">Human reviews</text>
    <text x="800" y="544" text-anchor="middle" class="small">and decides</text>
  </g>

  <!-- footer note -->
  <rect x="330" y="760" width="940" height="56" rx="20" fill="#E5E5E5"/>
  <text x="800" y="795" text-anchor="middle" class="small">This comparison is meant to prevent both hype and fear: AI is useful, but accountability stays human.</text>
</svg>
