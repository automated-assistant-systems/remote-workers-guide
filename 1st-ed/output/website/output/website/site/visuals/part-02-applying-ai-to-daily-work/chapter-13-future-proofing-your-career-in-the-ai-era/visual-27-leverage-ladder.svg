<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3A5F"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .label { font-size: 18px; font-weight: 600; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
      .box { stroke: #1F3A5F; stroke-width: 2; }
      .arrow { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
      .icon-circle { fill: #2FA4A9; }
      .muted { fill: #F7F7F7; }
    </style>
  </defs>
<text x="800" y="56" text-anchor="middle" class="title">
<tspan x="800" dy="0">Leverage Ladder</tspan>
</text>
<text x="800" y="90" text-anchor="middle" class="body">
<tspan x="800" dy="0">As your workflows mature, the same work can produce more value with less</tspan>
<tspan x="800" dy="1.3em">friction.</tspan>
</text>
<rect x="220" y="630" width="240" height="120" rx="18" fill="#F7F7F7" class="box"/><text x="340.0" y="672" text-anchor="middle" class="label">
<tspan x="340.0" dy="0">Manual work</tspan>
</text><text x="340.0" y="712" text-anchor="middle" class="small">
<tspan x="340.0" dy="0">You do every step</tspan>
<tspan x="340.0" dy="1.3em">yourself</tspan>
</text><line x1="460" y1="690" x2="500" y2="690" class="arrow"/><rect x="500" y="510" width="240" height="120" rx="18" fill="#EAF6F6" class="box"/><text x="620.0" y="552" text-anchor="middle" class="label">
<tspan x="620.0" dy="0">AI-assisted work</tspan>
</text><text x="620.0" y="592" text-anchor="middle" class="small">
<tspan x="620.0" dy="0">AI helps draft and</tspan>
<tspan x="620.0" dy="1.3em">structure</tspan>
</text><line x1="740" y1="570" x2="780" y2="570" class="arrow"/><rect x="780" y="390" width="240" height="120" rx="18" fill="#F5FBF2" class="box"/><text x="900.0" y="432" text-anchor="middle" class="label">
<tspan x="900.0" dy="0">Semi-automated</tspan>
<tspan x="900.0" dy="1.3em">workflows</tspan>
</text><text x="900.0" y="472" text-anchor="middle" class="small">
<tspan x="900.0" dy="0">Triggers and templates</tspan>
<tspan x="900.0" dy="1.3em">handle repeatable</tspan>
<tspan x="900.0" dy="1.3em">steps</tspan>
</text><line x1="1020" y1="450" x2="1060" y2="450" class="arrow"/><rect x="1060" y="270" width="240" height="120" rx="18" fill="#FFFFFF" class="box"/><text x="1180.0" y="312" text-anchor="middle" class="label">
<tspan x="1180.0" dy="0">Reusable systems</tspan>
</text><text x="1180.0" y="352" text-anchor="middle" class="small">
<tspan x="1180.0" dy="0">You build repeatable</tspan>
<tspan x="1180.0" dy="1.3em">assets that scale</tspan>
</text></svg>
