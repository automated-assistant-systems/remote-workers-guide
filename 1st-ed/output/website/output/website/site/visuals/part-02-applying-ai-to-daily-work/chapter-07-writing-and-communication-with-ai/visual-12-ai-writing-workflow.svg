<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3A5F"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .label { font-size: 18px; font-weight: 600; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
      .box { stroke: #1F3A5F; stroke-width: 2; }
      .arrow { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
      .icon-circle { fill: #2FA4A9; }
      .muted { fill: #F7F7F7; }
    </style>
  </defs>
<text x="800" y="56" text-anchor="middle" class="title"><tspan x="800" dy="0">AI Writing Workflow</tspan></text>
<text x="800" y="90" text-anchor="middle" class="body"><tspan x="800" dy="0">AI reduces drafting friction, but the human still owns the message, tone, and final judgment.</tspan></text>
<rect x="110" y="330" width="240" height="120" rx="24" fill="#F7F7F7" class="box"/>
<text x="230.0" y="398" text-anchor="middle" class="label"><tspan x="230.0" dy="0">Notes / ideas</tspan></text>
<rect x="440" y="330" width="240" height="120" rx="24" fill="#EAF6F6" class="box"/>
<text x="560.0" y="398" text-anchor="middle" class="label"><tspan x="560.0" dy="0">AI Draft</tspan></text>
<rect x="770" y="330" width="240" height="120" rx="24" fill="#F5FBF2" class="box"/>
<text x="890.0" y="398" text-anchor="middle" class="label"><tspan x="890.0" dy="0">Human Edit</tspan></text>
<rect x="1100" y="330" width="360" height="120" rx="24" fill="#FFFFFF" class="box"/>
<text x="1280.0" y="398" text-anchor="middle" class="label"><tspan x="1280.0" dy="0">Final Email /</tspan><tspan x="1280.0" dy="1.3em">Report / Proposal</tspan></text>
<line x1="350" y1="390" x2="440" y2="390" class="arrow"/>
<line x1="680" y1="390" x2="770" y2="390" class="arrow"/>
<line x1="1010" y1="390" x2="1100" y2="390" class="arrow"/>
<circle cx="230" cy="250" r="34" class="icon-circle"/>
<text x="230" y="258" text-anchor="middle" class="label"><tspan x="230" dy="0">1</tspan></text>
<circle cx="560" cy="250" r="34" class="icon-circle"/>
<text x="560" y="258" text-anchor="middle" class="label"><tspan x="560" dy="0">2</tspan></text>
<circle cx="890" cy="250" r="34" class="icon-circle"/>
<text x="890" y="258" text-anchor="middle" class="label"><tspan x="890" dy="0">3</tspan></text>
<circle cx="1280" cy="250" r="34" class="icon-circle"/>
<text x="1280" y="258" text-anchor="middle" class="label"><tspan x="1280" dy="0">4</tspan></text>
<text x="230" y="490" text-anchor="middle" class="body"><tspan x="230" dy="0">Key points</tspan><tspan x="230" dy="1.3em">rough bullets</tspan><tspan x="230" dy="1.3em">source material</tspan></text>
<text x="560" y="490" text-anchor="middle" class="body"><tspan x="560" dy="0">First version</tspan><tspan x="560" dy="1.3em">structure</tspan><tspan x="560" dy="1.3em">wording help</tspan></text>
<text x="890" y="490" text-anchor="middle" class="body"><tspan x="890" dy="0">Check facts</tspan><tspan x="890" dy="1.3em">tighten tone</tspan><tspan x="890" dy="1.3em">add judgment</tspan></text>
<text x="1280" y="490" text-anchor="middle" class="body"><tspan x="1280" dy="0">Sendable output</tspan><tspan x="1280" dy="1.3em">or polished deliverable</tspan></text>
<path d="M890 520 V620 H560 V450" class="arrow"/>
<text x="745" y="612" text-anchor="middle" class="body"><tspan x="745" dy="0">Revise prompt or ask for another pass</tspan></text>
<rect x="250" y="690" width="1100" height="84" rx="22" fill="#FFFFFF" class="box"/>
<text x="800" y="726" text-anchor="middle" class="label"><tspan x="800" dy="0">Best use: let AI create momentum, then refine with human context and standards.</tspan></text>
<text x="800" y="754" text-anchor="middle" class="body"><tspan x="800" dy="0">This keeps speed high without giving up ownership.</tspan></text>
</svg>
