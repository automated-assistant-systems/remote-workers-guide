<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3A5F"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .label { font-size: 18px; font-weight: 600; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
      .box { stroke: #1F3A5F; stroke-width: 2; }
      .arrow { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
      .icon-circle { fill: #2FA4A9; }
      .muted { fill: #F7F7F7; }
    </style>
  </defs>
<text x="800" y="56" text-anchor="middle" class="title">
<tspan x="800" dy="0">AI-Assisted Skill Gap Analysis</tspan>
</text>
<text x="800" y="90" text-anchor="middle" class="body">
<tspan x="800" dy="0">Use your current role as a starting point, then identify where automation ends</tspan>
<tspan x="800" dy="1.3em">and human value grows.</tspan>
</text>
<circle cx="250" cy="230" r="34" fill="#2FA4A9" /><text x="250" y="238" text-anchor="middle" class="label">
<tspan x="250" dy="0">1</tspan>
</text><rect x="80" y="300" width="340" height="250" rx="24" fill="#FFFFFF" class="box"/><text x="250" y="360" text-anchor="middle" class="label">
<tspan x="250" dy="0">Current role</tspan>
</text><text x="250" y="430" text-anchor="middle" class="body">
<tspan x="250" dy="0">What do you do now?</tspan>
</text><line x1="420" y1="425" x2="420" y2="425" class="arrow"/><circle cx="590" cy="230" r="34" fill="#2FA4A9" /><text x="590" y="238" text-anchor="middle" class="label">
<tspan x="590" dy="0">2</tspan>
</text><rect x="420" y="300" width="340" height="250" rx="24" fill="#F7F7F7" class="box"/><text x="590" y="360" text-anchor="middle" class="label">
<tspan x="590" dy="0">Automatable tasks</tspan>
</text><text x="590" y="430" text-anchor="middle" class="body">
<tspan x="590" dy="0">What repeats?</tspan>
<tspan x="590" dy="1.3em">What can be templated?</tspan>
</text><line x1="760" y1="425" x2="760" y2="425" class="arrow"/><circle cx="930" cy="230" r="34" fill="#2FA4A9" /><text x="930" y="238" text-anchor="middle" class="label">
<tspan x="930" dy="0">3</tspan>
</text><rect x="760" y="300" width="340" height="250" rx="24" fill="#F5FBF2" class="box"/><text x="930" y="360" text-anchor="middle" class="label">
<tspan x="930" dy="0">Human-value tasks</tspan>
</text><text x="930" y="430" text-anchor="middle" class="body">
<tspan x="930" dy="0">What needs judgment?</tspan>
<tspan x="930" dy="1.3em">What builds trust?</tspan>
</text><line x1="1100" y1="425" x2="1100" y2="425" class="arrow"/><circle cx="1270" cy="230" r="34" fill="#2FA4A9" /><text x="1270" y="238" text-anchor="middle" class="label">
<tspan x="1270" dy="0">4</tspan>
</text><rect x="1100" y="300" width="340" height="250" rx="24" fill="#EAF6F6" class="box"/><text x="1270" y="360" text-anchor="middle" class="label">
<tspan x="1270" dy="0">Next AI</tspan>
<tspan x="1270" dy="1.3em">collaboration skill</tspan>
</text><text x="1270" y="430" text-anchor="middle" class="body">
<tspan x="1270" dy="0">What should you learn next?</tspan>
</text></svg>
