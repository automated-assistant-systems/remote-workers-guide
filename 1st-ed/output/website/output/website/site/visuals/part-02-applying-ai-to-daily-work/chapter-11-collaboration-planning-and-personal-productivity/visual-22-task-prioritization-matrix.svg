<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3A5F"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .label { font-size: 18px; font-weight: 600; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
      .box { stroke: #1F3A5F; stroke-width: 2; }
      .arrow { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
      .icon-circle { fill: #2FA4A9; }
      .muted { fill: #F7F7F7; }
    </style>
  </defs>
<text x="800" y="56" text-anchor="middle" class="title">
<tspan x="800" dy="0">Task Prioritization Matrix</tspan>
</text>
<text x="800" y="90" text-anchor="middle" class="body">
<tspan x="800" dy="0">AI can help organize the options, but you still decide what matters most.</tspan>
</text>
<rect x="260" y="210" width="1080" height="620" fill="#FFFFFF" stroke="#1F3A5F" stroke-width="2"/><line x1="800.0" y1="210" x2="800.0" y2="830" stroke="#1F3A5F" stroke-width="2"/><line x1="260" y1="520.0" x2="1340" y2="520.0" stroke="#1F3A5F" stroke-width="2"/><text x="800" y="865" text-anchor="middle" class="label">
<tspan x="800" dy="0">Important</tspan>
</text><text x="105" y="530" text-anchor="start" class="label">
<tspan x="105" dy="0">Urgent</tspan>
</text><text x="530" y="280" text-anchor="middle" class="label">
<tspan x="530" dy="0">Do first</tspan>
</text><text x="1070" y="280" text-anchor="middle" class="label">
<tspan x="1070" dy="0">Delegate or streamline</tspan>
</text><text x="530" y="600" text-anchor="middle" class="label">
<tspan x="530" dy="0">Schedule</tspan>
</text><text x="1070" y="600" text-anchor="middle" class="label">
<tspan x="1070" dy="0">Reduce, delay, or drop</tspan>
</text><rect x="620" y="100" width="360" height="70" rx="22" fill="#EAF6F6" class="box"/><text x="800" y="142" text-anchor="middle" class="label">
<tspan x="800" dy="0">AI planning support</tspan>
</text><circle cx="450" cy="380" r="46" fill="#2FA4A9" /><text x="450" y="374" text-anchor="middle" class="small">
<tspan x="450" dy="0">Critical client</tspan>
<tspan x="450" dy="1.3em">issue</tspan>
</text><circle cx="690" cy="500" r="46" fill="#2FA4A9" /><text x="690" y="494" text-anchor="middle" class="small">
<tspan x="690" dy="0">Proposal</tspan>
<tspan x="690" dy="1.3em">revision</tspan>
</text><circle cx="1100" cy="400" r="46" fill="#2FA4A9" /><text x="1100" y="394" text-anchor="middle" class="small">
<tspan x="1100" dy="0">Routine</tspan>
<tspan x="1100" dy="1.3em">status reply</tspan>
</text><circle cx="1140" cy="690" r="46" fill="#6BBF59" /><text x="1140" y="684" text-anchor="middle" class="small">
<tspan x="1140" dy="0">Low-value</tspan>
<tspan x="1140" dy="1.3em">busywork</tspan>
</text></svg>
