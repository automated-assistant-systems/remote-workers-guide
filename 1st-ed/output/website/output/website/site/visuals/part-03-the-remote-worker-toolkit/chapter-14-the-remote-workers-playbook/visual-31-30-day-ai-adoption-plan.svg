<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3A5F"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .label { font-size: 18px; font-weight: 600; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
      .box { stroke: #1F3A5F; stroke-width: 2; }
      .arrow { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
      .icon-circle { fill: #2FA4A9; }
      .muted { fill: #F7F7F7; }
    </style>
  </defs>
<text x="800" y="56" text-anchor="middle" class="title">
<tspan x="800" dy="0">30-Day AI Adoption Plan</tspan>
</text>
<text x="800" y="90" text-anchor="middle" class="body">
<tspan x="800" dy="0">A simple month-long sequence can build momentum without overwhelming your</tspan>
<tspan x="800" dy="1.3em">workflow.</tspan>
</text>
<circle cx="260" cy="240" r="34" fill="#2FA4A9" /><text x="260" y="248" text-anchor="middle" class="label">
<tspan x="260" dy="0">1</tspan>
</text><rect x="110" y="300" width="300" height="360" rx="24" fill="#FFFFFF" class="box"/><rect x="140" y="330" width="120" height="44" rx="14" fill="#E5E5E5" class="box"/><text x="200" y="360" text-anchor="middle" class="body">
<tspan x="200" dy="0">Week 1</tspan>
</text><text x="260" y="425" text-anchor="middle" class="label">
<tspan x="260" dy="0">Templates</tspan>
</text><text x="260" y="505" text-anchor="middle" class="body">
<tspan x="260" dy="0">Create reusable prompts</tspan>
<tspan x="260" dy="1.3em">and checklists.</tspan>
</text><line x1="410" y1="480" x2="470" y2="480" class="arrow"/><circle cx="620" cy="240" r="34" fill="#2FA4A9" /><text x="620" y="248" text-anchor="middle" class="label">
<tspan x="620" dy="0">2</tspan>
</text><rect x="470" y="300" width="300" height="360" rx="24" fill="#EAF6F6" class="box"/><rect x="500" y="330" width="120" height="44" rx="14" fill="#E5E5E5" class="box"/><text x="560" y="360" text-anchor="middle" class="body">
<tspan x="560" dy="0">Week 2</tspan>
</text><text x="620" y="425" text-anchor="middle" class="label">
<tspan x="620" dy="0">Automation</tspan>
</text><text x="620" y="505" text-anchor="middle" class="body">
<tspan x="620" dy="0">Automate one routine</tspan>
<tspan x="620" dy="1.3em">workflow with review.</tspan>
</text><line x1="770" y1="480" x2="830" y2="480" class="arrow"/><circle cx="980" cy="240" r="34" fill="#2FA4A9" /><text x="980" y="248" text-anchor="middle" class="label">
<tspan x="980" dy="0">3</tspan>
</text><rect x="830" y="300" width="300" height="360" rx="24" fill="#FFFFFF" class="box"/><rect x="860" y="330" width="120" height="44" rx="14" fill="#E5E5E5" class="box"/><text x="920" y="360" text-anchor="middle" class="body">
<tspan x="920" dy="0">Week 3</tspan>
</text><text x="980" y="425" text-anchor="middle" class="label">
<tspan x="980" dy="0">Content repurposing</tspan>
</text><text x="980" y="505" text-anchor="middle" class="body">
<tspan x="980" dy="0">Turn one asset into</tspan>
<tspan x="980" dy="1.3em">multiple useful formats.</tspan>
</text><line x1="1130" y1="480" x2="1190" y2="480" class="arrow"/><circle cx="1340" cy="240" r="34" fill="#2FA4A9" /><text x="1340" y="248" text-anchor="middle" class="label">
<tspan x="1340" dy="0">4</tspan>
</text><rect x="1190" y="300" width="300" height="360" rx="24" fill="#EAF6F6" class="box"/><rect x="1220" y="330" width="120" height="44" rx="14" fill="#E5E5E5" class="box"/><text x="1280" y="360" text-anchor="middle" class="body">
<tspan x="1280" dy="0">Week 4</tspan>
</text><text x="1340" y="425" text-anchor="middle" class="label">
<tspan x="1340" dy="0">Public sharing /</tspan>
<tspan x="1340" dy="1.3em">reflection</tspan>
</text><text x="1340" y="505" text-anchor="middle" class="body">
<tspan x="1340" dy="0">Document what worked and</tspan>
<tspan x="1340" dy="1.3em">what to improve.</tspan>
</text></svg>
