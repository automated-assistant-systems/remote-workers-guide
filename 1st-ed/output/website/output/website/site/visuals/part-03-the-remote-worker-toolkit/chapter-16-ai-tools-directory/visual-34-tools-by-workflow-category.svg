<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3A5F"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .label { font-size: 18px; font-weight: 600; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
      .box { stroke: #1F3A5F; stroke-width: 2; }
      .arrow { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
      .icon-circle { fill: #2FA4A9; }
      .muted { fill: #F7F7F7; }
    </style>
  </defs>
<text x="800" y="56" text-anchor="middle" class="title">
<tspan x="800" dy="0">Tools by Workflow Category</tspan>
</text>
<text x="800" y="90" text-anchor="middle" class="body">
<tspan x="800" dy="0">Group tools by the kind of work they support so comparison becomes easier and</tspan>
<tspan x="800" dy="1.3em">more practical.</tspan>
</text>
<circle cx="800" cy="490" r="95" fill="#FFFFFF" stroke="#1F3A5F" stroke-width="2"/><text x="800" y="482" text-anchor="middle" class="label">
<tspan x="800" dy="0">Workflow</tspan>
<tspan x="800" dy="1.3em">categories</tspan>
</text><rect x="690" y="135" width="220" height="90" rx="22" fill="#EAF6F6" class="box"/><text x="800" y="186" text-anchor="middle" class="label">
<tspan x="800" dy="0">Writing</tspan>
</text><line x1="800" y1="390" x2="800" y2="235" class="arrow"/><rect x="250" y="295" width="220" height="90" rx="22" fill="#FFFFFF" class="box"/><text x="360" y="346" text-anchor="middle" class="label">
<tspan x="360" dy="0">Research</tspan>
</text><line x1="705" y1="458" x2="474" y2="358" class="arrow"/><rect x="1130" y="295" width="220" height="90" rx="22" fill="#F5FBF2" class="box"/><text x="1240" y="346" text-anchor="middle" class="label">
<tspan x="1240" dy="0">Creativity</tspan>
</text><line x1="895" y1="458" x2="1126" y2="358" class="arrow"/><rect x="130" y="545" width="220" height="90" rx="22" fill="#F7F7F7" class="box"/><text x="240" y="596" text-anchor="middle" class="label">
<tspan x="240" dy="0">Automation</tspan>
</text><line x1="702" y1="508" x2="358" y2="580" class="arrow"/><rect x="1250" y="545" width="220" height="90" rx="22" fill="#FFFFFF" class="box"/><text x="1360" y="596" text-anchor="middle" class="label">
<tspan x="1360" dy="0">Collaboration</tspan>
</text><line x1="898" y1="508" x2="1242" y2="580" class="arrow"/><rect x="450" y="735" width="220" height="90" rx="22" fill="#EAF6F6" class="box"/><text x="560" y="786" text-anchor="middle" class="label">
<tspan x="560" dy="0">Productivity</tspan>
</text><line x1="736" y1="567" x2="637" y2="738" class="arrow"/><rect x="930" y="735" width="220" height="90" rx="22" fill="#F5FBF2" class="box"/><text x="1040" y="786" text-anchor="middle" class="label">
<tspan x="1040" dy="0">Well-being</tspan>
</text><line x1="864" y1="567" x2="963" y2="738" class="arrow"/></svg>
