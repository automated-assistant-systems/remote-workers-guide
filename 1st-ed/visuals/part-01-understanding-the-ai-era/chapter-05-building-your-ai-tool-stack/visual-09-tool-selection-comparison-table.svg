<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Tool Selection Comparison Table</title>
  <desc id="desc">A comparison table for selecting tools intentionally using the criteria core use case, ease of use, integration, cost, and best for across four tool categories: AI assistant, design tool, organization tool, and automation tool.</desc>

  <defs>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .header { font-size: 18px; font-weight: 700; fill: #1F3A5F; }
      .cell { font-size: 18px; }
      .small { font-size: 16px; }
      .table-border { stroke: #1F3A5F; stroke-width: 2; fill: none; }
      .grid { stroke: #1F3A5F; stroke-width: 2; }
      .headfill { fill: #E5E5E5; }
      .subfill { fill: #F7F7F7; }
      .stepfill { fill: #2FA4A9; }
      .accentfill { fill: #6BBF59; }
      .pilltext { font-size: 16px; font-weight: 700; fill: white; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#1F3A5F"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="80" y="72" class="title">Tool Selection Comparison Table</text>
  <text x="80" y="108" class="cell">Choose tools by job to be done, not hype.</text>

  <!-- Comparison table -->
  <g transform="translate(80,150)">
    <!-- outer border -->
    <rect x="0" y="0" width="1440" height="620" rx="12" class="table-border"/>

    <!-- header row -->
    <rect x="0" y="0" width="1440" height="90" rx="12" class="headfill"/>
    <line x1="240" y1="0" x2="240" y2="620" class="grid"/>
    <line x1="520" y1="0" x2="520" y2="620" class="grid"/>
    <line x1="760" y1="0" x2="760" y2="620" class="grid"/>
    <line x1="980" y1="0" x2="980" y2="620" class="grid"/>
    <line x1="1160" y1="0" x2="1160" y2="620" class="grid"/>

    <line x1="0" y1="90" x2="1440" y2="90" class="grid"/>
    <line x1="0" y1="222" x2="1440" y2="222" class="grid"/>
    <line x1="0" y1="354" x2="1440" y2="354" class="grid"/>
    <line x1="0" y1="486" x2="1440" y2="486" class="grid"/>

    <!-- alternating fills -->
    <rect x="0" y="90" width="1440" height="132" class="subfill"/>
    <rect x="0" y="354" width="1440" height="132" class="subfill"/>

    <!-- header labels -->
    <text x="28" y="54" class="header">Tool type</text>
    <text x="268" y="54" class="header">Core use case</text>
    <text x="548" y="54" class="header">Ease of use</text>
    <text x="788" y="54" class="header">Integration</text>
    <text x="1008" y="54" class="header">Cost</text>
    <text x="1188" y="54" class="header">Best for</text>

    <!-- Row 1 -->
    <rect x="24" y="126" width="180" height="58" rx="29" class="stepfill"/>
    <text x="114" y="163" text-anchor="middle" class="pilltext">AI assistant</text>
    <text x="268" y="144" class="cell">Drafting, summarizing,</text>
    <text x="268" y="171" class="cell">brainstorming, Q&amp;A</text>
    <text x="548" y="158" class="cell">Usually fast to start</text>
    <text x="788" y="144" class="cell">Varies by app and</text>
    <text x="788" y="171" class="cell">workflow</text>
    <text x="1008" y="144" class="cell">Free tiers common,</text>
    <text x="1008" y="171" class="cell">paid adds power</text>
    <text x="1188" y="144" class="cell">General knowledge work,</text>
    <text x="1188" y="171" class="cell">writing, research</text>

    <!-- Row 2 -->
    <rect x="24" y="258" width="180" height="58" rx="29" class="stepfill"/>
    <text x="114" y="295" text-anchor="middle" class="pilltext">Design tool</text>
    <text x="268" y="276" class="cell">Visuals, layouts,</text>
    <text x="268" y="303" class="cell">brand assets</text>
    <text x="548" y="276" class="cell">Easy if template-led</text>
    <text x="548" y="303" class="cell">and repeatable</text>
    <text x="788" y="276" class="cell">Strong for export and</text>
    <text x="788" y="303" class="cell">asset reuse</text>
    <text x="1008" y="276" class="cell">Often freemium with</text>
    <text x="1008" y="303" class="cell">premium templates</text>
    <text x="1188" y="276" class="cell">Presentations, social</text>
    <text x="1188" y="303" class="cell">graphics, documents</text>

    <!-- Row 3 -->
    <rect x="24" y="390" width="180" height="58" rx="29" class="stepfill"/>
    <text x="114" y="427" text-anchor="middle" class="pilltext">Organization tool</text>
    <text x="268" y="408" class="cell">Notes, tasks, project</text>
    <text x="268" y="435" class="cell">tracking, knowledge</text>
    <text x="548" y="408" class="cell">Moderate setup, strong</text>
    <text x="548" y="435" class="cell">once structured</text>
    <text x="788" y="408" class="cell">Works best at the center</text>
    <text x="788" y="435" class="cell">of your workflow</text>
    <text x="1008" y="408" class="cell">Free tiers common,</text>
    <text x="1008" y="435" class="cell">team features paid</text>
    <text x="1188" y="408" class="cell">Planning, documentation,</text>
    <text x="1188" y="435" class="cell">personal systems</text>

    <!-- Row 4 -->
    <rect x="24" y="522" width="180" height="58" rx="29" class="accentfill"/>
    <text x="114" y="559" text-anchor="middle" class="pilltext">Automation tool</text>
    <text x="268" y="540" class="cell">Triggers, routing,</text>
    <text x="268" y="567" class="cell">repetitive actions</text>
    <text x="548" y="540" class="cell">Higher learning curve</text>
    <text x="548" y="567" class="cell">but big payoff</text>
    <text x="788" y="540" class="cell">Most valuable when it</text>
    <text x="788" y="567" class="cell">connects other tools</text>
    <text x="1008" y="540" class="cell">Often usage-based or</text>
    <text x="1008" y="567" class="cell">tiered</text>
    <text x="1188" y="540" class="cell">Busy workflows with</text>
    <text x="1188" y="567" class="cell">repeatable admin work</text>
  </g>

  <!-- Footer guidance -->
  <g transform="translate(80,810)">
    <rect x="0" y="0" width="1440" height="98" rx="12" fill="#F7F7F7" stroke="#1F3A5F" stroke-width="2"/>
    <circle cx="48" cy="49" r="22" fill="#2FA4A9"/>
    <path d="M48 36 L48 58 M48 67 L48 67" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <text x="88" y="43" class="header">How to use this table</text>
    <text x="88" y="73" class="cell">Start with the work you need done, compare tools by these criteria, then build the smallest stack that fits your workflow.</text>
  </g>
</svg>
