<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="v4title v4desc">
  <title id="v4title">Fragmented Remote Workflow Map</title>
  <desc id="v4desc">System map showing a remote worker surrounded by email, chat, documents, calendar, meetings, project board, notes, and deliverables, with arrows indicating constant context switching.</desc>
  <defs>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 30px; font-weight: 700; fill: #1F3A5F; }
      .node { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .body { font-size: 18px; }
      .small { font-size: 17px; font-weight: 600; fill: #1F3A5F; }
    </style>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#1F3A5F"/>
    </marker>
  </defs>

  <rect x="70" y="70" width="1460" height="760" rx="30" fill="#F7F7F7" stroke="#1F3A5F" stroke-width="3"/>

  <text x="800" y="128" text-anchor="middle" class="title">Fragmentation creates hidden work</text>

  <!-- central worker -->
  <g transform="translate(640 290)">
    <circle cx="160" cy="150" r="132" fill="white" stroke="#1F3A5F" stroke-width="4"/>
    <circle cx="160" cy="100" r="34" fill="#2FA4A9"/>
    <path d="M98 206 q62 -88 124 0" fill="#E5E5E5" stroke="#1F3A5F" stroke-width="3"/>
    <rect x="72" y="232" width="176" height="54" rx="18" fill="#E5E5E5"/>
    <text x="160" y="266" text-anchor="middle" class="small">remote worker</text>
  </g>

  <!-- nodes -->
  <g>
    <rect x="120" y="180" width="240" height="92" rx="22" fill="white" stroke="#1F3A5F" stroke-width="3"/>
    <text x="240" y="218" text-anchor="middle" class="node">Email</text>
    <text x="240" y="246" text-anchor="middle" class="body">inbox triage and follow-ups</text>

    <rect x="470" y="110" width="240" height="92" rx="22" fill="#E5E5E5" stroke="#1F3A5F" stroke-width="3"/>
    <text x="590" y="148" text-anchor="middle" class="node">Chat</text>
    <text x="590" y="176" text-anchor="middle" class="body">messages and quick requests</text>

    <rect x="890" y="110" width="240" height="92" rx="22" fill="white" stroke="#1F3A5F" stroke-width="3"/>
    <text x="1010" y="148" text-anchor="middle" class="node">Docs</text>
    <text x="1010" y="176" text-anchor="middle" class="body">drafts, edits, shared material</text>

    <rect x="1240" y="180" width="240" height="92" rx="22" fill="#E5E5E5" stroke="#1F3A5F" stroke-width="3"/>
    <text x="1360" y="218" text-anchor="middle" class="node">Calendar</text>
    <text x="1360" y="246" text-anchor="middle" class="body">deadlines, holds, scheduling</text>

    <rect x="1220" y="580" width="260" height="92" rx="22" fill="white" stroke="#1F3A5F" stroke-width="3"/>
    <text x="1350" y="618" text-anchor="middle" class="node">Meetings</text>
    <text x="1350" y="646" text-anchor="middle" class="body">live coordination and updates</text>

    <rect x="860" y="680" width="260" height="92" rx="22" fill="#E5E5E5" stroke="#1F3A5F" stroke-width="3"/>
    <text x="990" y="718" text-anchor="middle" class="node">Project board</text>
    <text x="990" y="746" text-anchor="middle" class="body">tasks, status, dependencies</text>

    <rect x="480" y="680" width="240" height="92" rx="22" fill="white" stroke="#1F3A5F" stroke-width="3"/>
    <text x="600" y="718" text-anchor="middle" class="node">Notes</text>
    <text x="600" y="746" text-anchor="middle" class="body">capture, reminders, loose ideas</text>

    <rect x="120" y="580" width="260" height="92" rx="22" fill="#E5E5E5" stroke="#1F3A5F" stroke-width="3"/>
    <text x="250" y="618" text-anchor="middle" class="node">Deliverables</text>
    <text x="250" y="646" text-anchor="middle" class="body">outputs assembled from many sources</text>
  </g>

  <!-- arrows from worker outward -->
  <g stroke="#1F3A5F" stroke-width="4" fill="none" marker-end="url(#arrow4)">
    <line x1="700" y1="380" x2="355" y2="255"/>
    <line x1="760" y1="340" x2="650" y2="205"/>
    <line x1="860" y1="340" x2="980" y2="205"/>
    <line x1="920" y1="380" x2="1242" y2="255"/>
    <line x1="920" y1="500" x2="1240" y2="598"/>
    <line x1="860" y1="540" x2="980" y2="680"/>
    <line x1="760" y1="540" x2="645" y2="680"/>
    <line x1="700" y1="500" x2="378" y2="598"/>
  </g>

  <!-- cross-links for context switching -->
  <g stroke="#2FA4A9" stroke-width="3" fill="none" stroke-dasharray="10 8" marker-end="url(#arrow4)">
    <line x1="360" y1="226" x2="470" y2="156"/>
    <line x1="710" y1="156" x2="890" y2="156"/>
    <line x1="1130" y1="156" x2="1240" y2="226"/>
    <line x1="1310" y1="272" x2="1325" y2="580"/>
    <line x1="1220" y1="648" x2="1120" y2="712"/>
    <line x1="860" y1="726" x2="720" y2="726"/>
    <line x1="480" y1="726" x2="380" y2="648"/>
    <line x1="240" y1="580" x2="240" y2="272"/>
  </g>

  <!-- bottom interpretation -->
  <rect x="350" y="800" width="900" height="52" rx="18" fill="#E5E5E5"/>
  <text x="800" y="833" text-anchor="middle" class="small">The drag comes from switching, tracking, and reconnecting work across systems.</text>
</svg>