<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="v3title v3desc">
  <title id="v3title">AI Productivity Stack</title>
  <desc id="v3desc">Layered stack showing task execution, information processing, communication, and decision making, with AI assistance reducing load across each layer.</desc>
  <defs>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 30px; font-weight: 700; fill: #1F3A5F; }
      .layer { font-size: 26px; font-weight: 700; fill: #1F3A5F; }
      .body { font-size: 19px; }
      .small { font-size: 17px; font-weight: 600; }
      .white { fill: white; }
    </style>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#1F3A5F"/>
    </marker>
  </defs>

  <rect x="70" y="70" width="1460" height="760" rx="30" fill="#F7F7F7" stroke="#1F3A5F" stroke-width="3"/>

  <!-- left stack -->
  <g transform="translate(180 140)">
    <text x="330" y="0" text-anchor="middle" class="title">Workload builds in layers</text>

    <rect x="0" y="470" width="660" height="120" rx="24" fill="#F7F7F7" stroke="#1F3A5F" stroke-width="3"/>
    <circle cx="88" cy="530" r="38" fill="#2FA4A9"/>
    <rect x="68" y="510" width="40" height="40" rx="8" fill="white"/>
    <line x1="78" y1="522" x2="98" y2="522" stroke="#2FA4A9" stroke-width="4"/>
    <line x1="78" y1="534" x2="98" y2="534" stroke="#2FA4A9" stroke-width="4"/>
    <line x1="78" y1="546" x2="94" y2="546" stroke="#2FA4A9" stroke-width="4"/>
    <text x="180" y="522" class="layer">Task execution</text>
    <text x="180" y="554" class="body">follow-ups, formatting, admin work, handoffs</text>

    <rect x="45" y="335" width="570" height="120" rx="24" fill="#E5E5E5" stroke="#1F3A5F" stroke-width="3"/>
    <circle cx="133" cy="395" r="38" fill="#2FA4A9"/>
    <path d="M116 395 h34 M133 378 v34" stroke="white" stroke-width="7" stroke-linecap="round"/>
    <text x="225" y="387" class="layer">Information processing</text>
    <text x="225" y="419" class="body">reading, sorting, summarizing, extracting signal</text>

    <rect x="90" y="200" width="480" height="120" rx="24" fill="#F7F7F7" stroke="#1F3A5F" stroke-width="3"/>
    <circle cx="178" cy="260" r="38" fill="#2FA4A9"/>
    <circle cx="162" cy="250" r="8" fill="white"/>
    <circle cx="194" cy="250" r="8" fill="white"/>
    <path d="M150 276 q12 -12 24 0" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M182 276 q12 -12 24 0" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
    <text x="270" y="252" class="layer">Communication</text>
    <text x="270" y="284" class="body">messages, updates, meetings, coordination loops</text>

    <rect x="135" y="65" width="390" height="120" rx="24" fill="#E5E5E5" stroke="#1F3A5F" stroke-width="3"/>
    <circle cx="223" cy="125" r="38" fill="#2FA4A9"/>
    <path d="M208 124 l12 12 18 -26" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="315" y="117" class="layer">Decision making</text>
    <text x="315" y="149" class="body">priorities, tradeoffs, judgment, next steps</text>
  </g>

  <!-- right overlay -->
  <g transform="translate(930 140)">
    <text x="230" y="0" text-anchor="middle" class="title">AI can reduce friction across the stack</text>

    <rect x="0" y="55" width="460" height="555" rx="28" fill="white" stroke="#1F3A5F" stroke-width="3"/>

    <g transform="translate(58 105)">
      <rect x="0" y="0" width="344" height="72" rx="18" fill="#6BBF59"/>
      <text x="172" y="44" text-anchor="middle" class="layer white">Decision support</text>

      <rect x="0" y="102" width="344" height="72" rx="18" fill="#2FA4A9"/>
      <text x="172" y="146" text-anchor="middle" class="layer white">Drafting and response help</text>

      <rect x="0" y="204" width="344" height="72" rx="18" fill="#6BBF59"/>
      <text x="172" y="248" text-anchor="middle" class="layer white">Summaries and synthesis</text>

      <rect x="0" y="306" width="344" height="72" rx="18" fill="#2FA4A9"/>
      <text x="172" y="350" text-anchor="middle" class="layer white">Execution assistance</text>

      <line x1="372" y1="36" x2="420" y2="36" stroke="#1F3A5F" stroke-width="4" marker-end="url(#arrow3)"/>
      <line x1="372" y1="138" x2="420" y2="138" stroke="#1F3A5F" stroke-width="4" marker-end="url(#arrow3)"/>
      <line x1="372" y1="240" x2="420" y2="240" stroke="#1F3A5F" stroke-width="4" marker-end="url(#arrow3)"/>
      <line x1="372" y1="342" x2="420" y2="342" stroke="#1F3A5F" stroke-width="4" marker-end="url(#arrow3)"/>

      <rect x="426" y="4" width="96" height="64" rx="18" fill="#F7F7F7" stroke="#1F3A5F" stroke-width="2"/>
      <text x="474" y="32" text-anchor="middle" class="small">less</text>
      <text x="474" y="54" text-anchor="middle" class="small">mental load</text>

      <rect x="426" y="106" width="96" height="64" rx="18" fill="#F7F7F7" stroke="#1F3A5F" stroke-width="2"/>
      <text x="474" y="134" text-anchor="middle" class="small">fewer</text>
      <text x="474" y="156" text-anchor="middle" class="small">bottlenecks</text>

      <rect x="426" y="208" width="96" height="64" rx="18" fill="#F7F7F7" stroke="#1F3A5F" stroke-width="2"/>
      <text x="474" y="236" text-anchor="middle" class="small">clearer</text>
      <text x="474" y="258" text-anchor="middle" class="small">signal</text>

      <rect x="426" y="310" width="96" height="64" rx="18" fill="#F7F7F7" stroke="#1F3A5F" stroke-width="2"/>
      <text x="474" y="338" text-anchor="middle" class="small">faster</text>
      <text x="474" y="360" text-anchor="middle" class="small">throughput</text>
    </g>

    <rect x="48" y="640" width="364" height="80" rx="22" fill="#E5E5E5"/>
    <text x="230" y="675" text-anchor="middle" class="small">Productivity strain is structural, not just personal.</text>
    <text x="230" y="705" text-anchor="middle" class="small">AI helps when it reduces friction at each layer.</text>
  </g>
</svg>