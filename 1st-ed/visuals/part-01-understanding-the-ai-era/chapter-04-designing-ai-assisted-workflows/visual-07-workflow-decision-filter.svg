<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3A5F"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .label { font-size: 18px; font-weight: 600; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
      .box { stroke: #1F3A5F; stroke-width: 2; }
      .arrow { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
      .icon-circle { fill: #2FA4A9; }
      .muted { fill: #F7F7F7; }
    </style>
  </defs>
<text x="800" y="56" text-anchor="middle" class="title"><tspan x="800" dy="0">Workflow Decision Filter</tspan></text>
<text x="800" y="90" text-anchor="middle" class="body"><tspan x="800" dy="0">Decide whether a task should stay manual, become AI-assisted, or be automated with review.</tspan></text>
<rect x="660" y="120" width="280" height="78" rx="22" fill="#F7F7F7" class="box"/>
<text x="800" y="168" text-anchor="middle" class="label"><tspan x="800" dy="0">Start with a task</tspan></text>
<polygon points="800,230.0 980.0,290 800,350.0 620.0,290" fill="#FFFFFF" stroke="#1F3A5F" stroke-width="2"/>
<text x="800" y="275" text-anchor="middle" class="label"><tspan x="800" dy="0">Is the task repetitive?</tspan></text>
<polygon points="800,410.0 980.0,470 800,530.0 620.0,470" fill="#FFFFFF" stroke="#1F3A5F" stroke-width="2"/>
<text x="800" y="455" text-anchor="middle" class="label"><tspan x="800" dy="0">Does it require</tspan><tspan x="800" dy="1.3em">judgment?</tspan></text>
<polygon points="420,590.0 600.0,650 420,710.0 240.0,650" fill="#FFFFFF" stroke="#1F3A5F" stroke-width="2"/>
<text x="420" y="635" text-anchor="middle" class="label"><tspan x="420" dy="0">Does it require</tspan><tspan x="420" dy="1.3em">expertise?</tspan></text>
<polygon points="1180,590.0 1360.0,650 1180,710.0 1000.0,650" fill="#FFFFFF" stroke="#1F3A5F" stroke-width="2"/>
<text x="1180" y="635" text-anchor="middle" class="label"><tspan x="1180" dy="0">Can the output be reviewed</tspan><tspan x="1180" dy="1.3em">easily?</tspan></text>
<rect x="160" y="830" width="300" height="92" rx="22" fill="#F7F7F7" class="box"/>
<text x="310" y="868" text-anchor="middle" class="label"><tspan x="310" dy="0">Keep manual</tspan></text>
<text x="310" y="894" text-anchor="middle" class="small"><tspan x="310" dy="0">High judgment and expertise</tspan></text>
<rect x="650" y="830" width="300" height="92" rx="22" fill="#F0FAED" class="box"/>
<text x="800" y="868" text-anchor="middle" class="label"><tspan x="800" dy="0">Use AI assistance</tspan></text>
<text x="800" y="894" text-anchor="middle" class="small"><tspan x="800" dy="0">Drafting, structuring, support</tspan></text>
<rect x="1140" y="830" width="300" height="92" rx="22" fill="#EEF9F9" class="box"/>
<text x="1290" y="868" text-anchor="middle" class="label"><tspan x="1290" dy="0">Automate with review</tspan></text>
<text x="1290" y="894" text-anchor="middle" class="small"><tspan x="1290" dy="0">Repeatable and easy to verify</tspan></text>
<line x1="800" y1="198" x2="800" y2="230" class="arrow"/>
<line x1="800" y1="350" x2="800" y2="410" class="arrow"/>
<text x="835" y="392" text-anchor="start" class="small"><tspan x="835" dy="0">Yes</tspan></text>
<path d="M620 290 H310 V830" class="arrow"/>
<text x="560" y="276" text-anchor="middle" class="small"><tspan x="560" dy="0">No</tspan></text>
<path d="M710 470 H420 V590" class="arrow"/>
<text x="615" y="458" text-anchor="middle" class="small"><tspan x="615" dy="0">Yes</tspan></text>
<path d="M890 470 H1180 V590" class="arrow"/>
<text x="985" y="458" text-anchor="middle" class="small"><tspan x="985" dy="0">No</tspan></text>
<path d="M420 710 V780 H310 V830" class="arrow"/>
<text x="445" y="760" text-anchor="start" class="small"><tspan x="445" dy="0">Yes</tspan></text>
<path d="M510 650 H800 V830" class="arrow"/>
<text x="650" y="636" text-anchor="middle" class="small"><tspan x="650" dy="0">No</tspan></text>
<path d="M1180 710 V780 H1290 V830" class="arrow"/>
<text x="1208" y="760" text-anchor="start" class="small"><tspan x="1208" dy="0">Yes</tspan></text>
<path d="M1090 650 H800 V830" class="arrow"/>
<text x="950" y="636" text-anchor="middle" class="small"><tspan x="950" dy="0">No</tspan></text>
<rect x="60" y="200" width="230" height="120" rx="16" fill="#FFFFFF" class="box"/>
<text x="175" y="240" text-anchor="middle" class="label"><tspan x="175" dy="0">Manual tasks</tspan></text>
<text x="175" y="268" text-anchor="middle" class="body"><tspan x="175" dy="0">Unique decisions</tspan><tspan x="175" dy="1.3em">Sensitive judgment</tspan><tspan x="175" dy="1.3em">Hard to standardize</tspan></text>
<rect x="1310" y="200" width="230" height="120" rx="16" fill="#FFFFFF" class="box"/>
<text x="1425" y="240" text-anchor="middle" class="label"><tspan x="1425" dy="0">Good automation candidates</tspan></text>
<text x="1425" y="268" text-anchor="middle" class="body"><tspan x="1425" dy="0">Repeatable steps</tspan><tspan x="1425" dy="1.3em">Clear rules</tspan><tspan x="1425" dy="1.3em">Simple review path</tspan></text>
</svg>
