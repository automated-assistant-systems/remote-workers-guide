<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" viewBox="0 0 1600 940" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3A5F"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .label { font-size: 18px; font-weight: 600; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
      .box { stroke: #1F3A5F; stroke-width: 2; }
      .arrow { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
      .icon-circle { fill: #2FA4A9; }
      .muted { fill: #F7F7F7; }
    </style>
  </defs>
<text x="800" y="56" text-anchor="middle" class="title">
<tspan x="800" dy="0">Five Tasks to Automate First</tspan>
</text>
<text x="800" y="90" text-anchor="middle" class="body">
<tspan x="800" dy="0">Start with routine work that is repeatable, reviewable, and easy to improve over</tspan>
<tspan x="800" dy="1.3em">time.</tspan>
</text>
<circle cx="195" cy="210" r="34" fill="#2FA4A9" /><text x="195" y="218" text-anchor="middle" class="label">
<tspan x="195" dy="0">1</tspan>
</text><rect x="90" y="260" width="210" height="420" rx="24" fill="#FFFFFF" class="box"/><text x="195" y="325" text-anchor="middle" class="label">
<tspan x="195" dy="0">Email triage</tspan>
</text><text x="195" y="390" text-anchor="middle" class="body">
<tspan x="195" dy="0">Sort, label, and</tspan>
<tspan x="195" dy="1.3em">surface priority</tspan>
<tspan x="195" dy="1.3em">messages.</tspan>
</text><rect x="115" y="560" width="160" height="70" rx="18" fill="#F5FBF2" class="box"/><text x="195" y="588" text-anchor="middle" class="body">
<tspan x="195" dy="0">Good first</tspan>
<tspan x="195" dy="1.3em">automation</tspan>
</text><circle cx="495" cy="210" r="34" fill="#2FA4A9" /><text x="495" y="218" text-anchor="middle" class="label">
<tspan x="495" dy="0">2</tspan>
</text><rect x="390" y="260" width="210" height="420" rx="24" fill="#FFFFFF" class="box"/><text x="495" y="325" text-anchor="middle" class="label">
<tspan x="495" dy="0">Meeting notes</tspan>
</text><text x="495" y="390" text-anchor="middle" class="body">
<tspan x="495" dy="0">Turn transcripts</tspan>
<tspan x="495" dy="1.3em">into summaries and</tspan>
<tspan x="495" dy="1.3em">action items.</tspan>
</text><rect x="415" y="560" width="160" height="70" rx="18" fill="#EAF6F6" class="box"/><text x="495" y="588" text-anchor="middle" class="body">
<tspan x="495" dy="0">Good first</tspan>
<tspan x="495" dy="1.3em">automation</tspan>
</text><circle cx="795" cy="210" r="34" fill="#2FA4A9" /><text x="795" y="218" text-anchor="middle" class="label">
<tspan x="795" dy="0">3</tspan>
</text><rect x="690" y="260" width="210" height="420" rx="24" fill="#FFFFFF" class="box"/><text x="795" y="325" text-anchor="middle" class="label">
<tspan x="795" dy="0">Client</tspan>
<tspan x="795" dy="1.3em">onboarding</tspan>
</text><text x="795" y="390" text-anchor="middle" class="body">
<tspan x="795" dy="0">Collect details,</tspan>
<tspan x="795" dy="1.3em">confirm steps, and</tspan>
<tspan x="795" dy="1.3em">trigger follow-up</tspan>
<tspan x="795" dy="1.3em">tasks.</tspan>
</text><rect x="715" y="560" width="160" height="70" rx="18" fill="#F5FBF2" class="box"/><text x="795" y="588" text-anchor="middle" class="body">
<tspan x="795" dy="0">Good first</tspan>
<tspan x="795" dy="1.3em">automation</tspan>
</text><circle cx="1095" cy="210" r="34" fill="#2FA4A9" /><text x="1095" y="218" text-anchor="middle" class="label">
<tspan x="1095" dy="0">4</tspan>
</text><rect x="990" y="260" width="210" height="420" rx="24" fill="#FFFFFF" class="box"/><text x="1095" y="325" text-anchor="middle" class="label">
<tspan x="1095" dy="0">Content</tspan>
<tspan x="1095" dy="1.3em">repurposing</tspan>
</text><text x="1095" y="390" text-anchor="middle" class="body">
<tspan x="1095" dy="0">Turn one draft</tspan>
<tspan x="1095" dy="1.3em">into posts,</tspan>
<tspan x="1095" dy="1.3em">emails, or</tspan>
<tspan x="1095" dy="1.3em">summaries.</tspan>
</text><rect x="1015" y="560" width="160" height="70" rx="18" fill="#EAF6F6" class="box"/><text x="1095" y="588" text-anchor="middle" class="body">
<tspan x="1095" dy="0">Good first</tspan>
<tspan x="1095" dy="1.3em">automation</tspan>
</text><circle cx="1395" cy="210" r="34" fill="#2FA4A9" /><text x="1395" y="218" text-anchor="middle" class="label">
<tspan x="1395" dy="0">5</tspan>
</text><rect x="1290" y="260" width="210" height="420" rx="24" fill="#FFFFFF" class="box"/><text x="1395" y="325" text-anchor="middle" class="label">
<tspan x="1395" dy="0">Expense logging</tspan>
</text><text x="1395" y="390" text-anchor="middle" class="body">
<tspan x="1395" dy="0">Capture receipts,</tspan>
<tspan x="1395" dy="1.3em">categorize items,</tspan>
<tspan x="1395" dy="1.3em">and flag missing</tspan>
<tspan x="1395" dy="1.3em">details.</tspan>
</text><rect x="1315" y="560" width="160" height="70" rx="18" fill="#F5FBF2" class="box"/><text x="1395" y="588" text-anchor="middle" class="body">
<tspan x="1395" dy="0">Good first</tspan>
<tspan x="1395" dy="1.3em">automation</tspan>
</text><rect x="250" y="730" width="1100" height="120" rx="28" fill="#F7F7F7" class="box"/><text x="800" y="775" text-anchor="middle" class="label">
<tspan x="800" dy="0">Choose tasks with clear inputs, predictable outputs, and a simple review step.</tspan>
</text></svg>
