<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3A5F"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .label { font-size: 18px; font-weight: 600; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
      .box { stroke: #1F3A5F; stroke-width: 2; }
      .arrow { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
      .icon-circle { fill: #2FA4A9; }
      .muted { fill: #F7F7F7; }
    </style>
  </defs>
<text x="800" y="56" text-anchor="middle" class="title">
<tspan x="800" dy="0">Five-Minute Reset Options</tspan>
</text>
<text x="800" y="90" text-anchor="middle" class="body">
<tspan x="800" dy="0">Small recovery actions can interrupt overload and help you return to work with</tspan>
<tspan x="800" dy="1.3em">more clarity.</tspan>
</text>
<circle cx="260" cy="195" r="30" fill="#2FA4A9" /><text x="260" y="203" text-anchor="middle" class="label">
<tspan x="260" dy="0">1</tspan>
</text><rect x="120" y="230" width="280" height="180" rx="24" fill="#FFFFFF" class="box"/><text x="260" y="285" text-anchor="middle" class="label">
<tspan x="260" dy="0">Breathing break</tspan>
</text><text x="260" y="332" text-anchor="middle" class="body">
<tspan x="260" dy="0">Slow your pace and reset</tspan>
<tspan x="260" dy="1.3em">attention.</tspan>
</text><circle cx="680" cy="195" r="30" fill="#2FA4A9" /><text x="680" y="203" text-anchor="middle" class="label">
<tspan x="680" dy="0">2</tspan>
</text><rect x="540" y="230" width="280" height="180" rx="24" fill="#EAF6F6" class="box"/><text x="680" y="285" text-anchor="middle" class="label">
<tspan x="680" dy="0">Stretch</tspan>
</text><text x="680" y="332" text-anchor="middle" class="body">
<tspan x="680" dy="0">Loosen shoulders, neck,</tspan>
<tspan x="680" dy="1.3em">and back.</tspan>
</text><circle cx="1100" cy="195" r="30" fill="#2FA4A9" /><text x="1100" y="203" text-anchor="middle" class="label">
<tspan x="1100" dy="0">3</tspan>
</text><rect x="960" y="230" width="280" height="180" rx="24" fill="#FFFFFF" class="box"/><text x="1100" y="285" text-anchor="middle" class="label">
<tspan x="1100" dy="0">Quick walk</tspan>
</text><text x="1100" y="332" text-anchor="middle" class="body">
<tspan x="1100" dy="0">Change state with a</tspan>
<tspan x="1100" dy="1.3em">short movement break.</tspan>
</text><circle cx="470" cy="485" r="30" fill="#2FA4A9" /><text x="470" y="493" text-anchor="middle" class="label">
<tspan x="470" dy="0">4</tspan>
</text><rect x="330" y="520" width="280" height="180" rx="24" fill="#EAF6F6" class="box"/><text x="470" y="575" text-anchor="middle" class="label">
<tspan x="470" dy="0">Journaling note</tspan>
</text><text x="470" y="622" text-anchor="middle" class="body">
<tspan x="470" dy="0">Write what is stuck and</tspan>
<tspan x="470" dy="1.3em">what matters next.</tspan>
</text><circle cx="890" cy="485" r="30" fill="#2FA4A9" /><text x="890" y="493" text-anchor="middle" class="label">
<tspan x="890" dy="0">5</tspan>
</text><rect x="750" y="520" width="280" height="180" rx="24" fill="#FFFFFF" class="box"/><text x="890" y="575" text-anchor="middle" class="label">
<tspan x="890" dy="0">Screen-free pause</tspan>
</text><text x="890" y="622" text-anchor="middle" class="body">
<tspan x="890" dy="0">Look away, step back,</tspan>
<tspan x="890" dy="1.3em">and reduce input.</tspan>
</text></svg>
