<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3A5F"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .label { font-size: 18px; font-weight: 600; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
      .box { stroke: #1F3A5F; stroke-width: 2; }
      .arrow { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
      .icon-circle { fill: #2FA4A9; }
      .muted { fill: #F7F7F7; }
    </style>
  </defs>
<text x="800" y="56" text-anchor="middle" class="title">
<tspan x="800" dy="0">Starter Stack Path</tspan>
</text>
<text x="800" y="90" text-anchor="middle" class="body">
<tspan x="800" dy="0">Adopt tools in stages so the stack grows from real needs instead of impulse and</tspan>
<tspan x="800" dy="1.3em">overload.</tspan>
</text>
<circle cx="190" cy="220" r="34" fill="#2FA4A9" /><text x="190" y="228" text-anchor="middle" class="label">
<tspan x="190" dy="0">1</tspan>
</text><rect x="60" y="300" width="260" height="160" rx="24" fill="#FFFFFF" class="box"/><text x="190" y="380" text-anchor="middle" class="label">
<tspan x="190" dy="0">AI assistant</tspan>
</text><line x1="320" y1="380" x2="360" y2="380" class="arrow"/><circle cx="490" cy="220" r="34" fill="#2FA4A9" /><text x="490" y="228" text-anchor="middle" class="label">
<tspan x="490" dy="0">2</tspan>
</text><rect x="360" y="300" width="260" height="160" rx="24" fill="#F7F7F7" class="box"/><text x="490" y="380" text-anchor="middle" class="label">
<tspan x="490" dy="0">Organization</tspan>
</text><line x1="620" y1="380" x2="660" y2="380" class="arrow"/><circle cx="790" cy="220" r="34" fill="#2FA4A9" /><text x="790" y="228" text-anchor="middle" class="label">
<tspan x="790" dy="0">3</tspan>
</text><rect x="660" y="300" width="260" height="160" rx="24" fill="#EAF6F6" class="box"/><text x="790" y="380" text-anchor="middle" class="label">
<tspan x="790" dy="0">Writing support</tspan>
</text><line x1="920" y1="380" x2="960" y2="380" class="arrow"/><circle cx="1090" cy="220" r="34" fill="#2FA4A9" /><text x="1090" y="228" text-anchor="middle" class="label">
<tspan x="1090" dy="0">4</tspan>
</text><rect x="960" y="300" width="260" height="160" rx="24" fill="#F5FBF2" class="box"/><text x="1090" y="380" text-anchor="middle" class="label">
<tspan x="1090" dy="0">Automation</tspan>
</text><line x1="1220" y1="380" x2="1260" y2="380" class="arrow"/><circle cx="1390" cy="220" r="34" fill="#2FA4A9" /><text x="1390" y="228" text-anchor="middle" class="label">
<tspan x="1390" dy="0">5</tspan>
</text><rect x="1260" y="300" width="260" height="160" rx="24" fill="#FFFFFF" class="box"/><text x="1390" y="380" text-anchor="middle" class="label">
<tspan x="1390" dy="0">Specialized tools</tspan>
</text><rect x="280" y="620" width="1040" height="90" rx="24" fill="#F5FBF2" class="box"/><text x="800" y="675" text-anchor="middle" class="body">
<tspan x="800" dy="0">Start simple, integrate what works, then add specialized tools only when the workflow demands them.</tspan>
</text></svg>
