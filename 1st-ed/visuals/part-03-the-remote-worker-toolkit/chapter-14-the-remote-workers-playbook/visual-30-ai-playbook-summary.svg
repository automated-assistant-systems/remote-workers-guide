<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950" fill="none">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F3A5F"/>
    </marker>
    <style>
      text { font-family: Inter, Arial, sans-serif; fill: #333333; }
      .title { font-size: 24px; font-weight: 700; fill: #1F3A5F; }
      .label { font-size: 18px; font-weight: 600; }
      .body { font-size: 16px; }
      .small { font-size: 14px; }
      .box { stroke: #1F3A5F; stroke-width: 2; }
      .arrow { stroke: #1F3A5F; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
      .icon-circle { fill: #2FA4A9; }
      .muted { fill: #F7F7F7; }
    </style>
  </defs>
<text x="800" y="56" text-anchor="middle" class="title">
<tspan x="800" dy="0">AI Playbook Summary</tspan>
</text>
<text x="800" y="90" text-anchor="middle" class="body">
<tspan x="800" dy="0">Treat AI adoption as an operating rhythm built from daily, weekly, and monthly</tspan>
<tspan x="800" dy="1.3em">practices.</tspan>
</text>
<circle cx="800" cy="500" r="85" fill="#FFFFFF" stroke="#1F3A5F" stroke-width="2"/><text x="800" y="490" text-anchor="middle" class="label">
<tspan x="800" dy="0">AI</tspan>
<tspan x="800" dy="1.3em">Playbook</tspan>
</text><rect x="670" y="155" width="260" height="110" rx="22" fill="#EAF6F6" class="box"/><text x="800" y="218" text-anchor="middle" class="label">
<tspan x="800" dy="0">Daily routines</tspan>
</text><line x1="800" y1="410" x2="800" y2="275" class="arrow"/><rect x="1030" y="445" width="260" height="110" rx="22" fill="#F5FBF2" class="box"/><text x="1160" y="508" text-anchor="middle" class="label">
<tspan x="1160" dy="0">Weekly reviews</tspan>
</text><line x1="890" y1="500" x2="1020" y2="500" class="arrow"/><rect x="670" y="735" width="260" height="110" rx="22" fill="#F7F7F7" class="box"/><text x="800" y="798" text-anchor="middle" class="label">
<tspan x="800" dy="0">Monthly resets</tspan>
</text><line x1="800" y1="590" x2="800" y2="725" class="arrow"/><rect x="310" y="445" width="260" height="110" rx="22" fill="#FFFFFF" class="box"/><text x="440" y="508" text-anchor="middle" class="label">
<tspan x="440" dy="0">Iterative</tspan>
<tspan x="440" dy="1.3em">improvement</tspan>
