book:
  title: "The Remote Worker’s Survival Guide in the AI Age"
  subtitle: "Practical Tools, Workflows, and Strategies for Thriving Anywhere"
  author: "Gary G. Bayes"

core_model:
  name: "Human Judgment + AI Assistance + Smart Workflows = Leverage"
  components:
    - human_judgment
    - ai_assistance
    - smart_workflows
    - leverage
  notes: >
    This is the conceptual backbone of the manuscript. It should be reinforced
    throughout the book without being repeated mechanically.

reader_journey:
  stages:
    - name: "understanding"
      parts: ["part_1"]
      outcome: "Conceptual grounding in remote work change, AI assistants, workflows, tools, and prompting."
    - name: "application"
      parts: ["part_2"]
      outcome: "Practical understanding of how AI supports real categories of daily work."
    - name: "implementation"
      parts: ["part_3"]
      outcome: "Reusable routines, prompts, and tool references that operationalize the book."

parts:
  part_1:
    title: "Understanding the AI Era"
    emphasis: "human_judgment"
    purpose: >
      Establish conceptual foundations before introducing use-case applications.
  part_2:
    title: "Applying AI to Daily Work"
    emphasis: "ai_assistance"
    purpose: >
      Demonstrate how AI improves real work domains and daily professional tasks.
  part_3:
    title: "The Remote Worker Toolkit"
    emphasis: "smart_workflows"
    purpose: >
      Convert lessons from the book into repeatable systems, prompt assets, and tool references.

chapters:
  chapter_01:
    title: "The New Reality of Remote Work"
    part: "part_1"
    role: "orientation"
    introduces:
      - remote_work_transformation
    may_reference: []
    must_not_reteach: []
  chapter_02:
    title: "The Hidden Productivity Problem"
    part: "part_1"
    role: "problem_diagnosis"
    introduces:
      - productivity_fragmentation
    may_reference:
      - remote_work_transformation
    must_not_reteach:
      - remote_work_transformation
  chapter_03:
    title: "Understanding AI Assistants"
    part: "part_1"
    role: "conceptual_foundation"
    introduces:
      - ai_assistants
      - augmentation_not_replacement
    may_reference:
      - remote_work_transformation
      - productivity_fragmentation
    must_not_reteach:
      - remote_work_transformation
      - productivity_fragmentation
  chapter_04:
    title: "Designing AI-Assisted Workflows"
    part: "part_1"
    role: "workflow_hinge"
    introduces:
      - workflow_thinking
      - human_ai_work_model
      - workflow_decision_filter
    may_reference:
      - ai_assistants
      - productivity_fragmentation
    must_not_reteach:
      - remote_work_transformation
      - productivity_fragmentation
      - ai_assistants
  chapter_05:
    title: "Building Your AI Tool Stack"
    part: "part_1"
    role: "tool_selection_framework"
    introduces:
      - tool_stack_design
      - tool_selection_criteria
      - lean_starter_stack
    may_reference:
      - workflow_thinking
      - ai_assistants
    must_not_reteach:
      - remote_work_transformation
      - productivity_fragmentation
      - ai_assistants
      - workflow_thinking
  chapter_06:
    title: "Prompting: How to Work with AI Effectively"
    part: "part_1"
    role: "operational_skill"
    introduces:
      - prompting
      - prompt_structure
      - prompt_iteration
    may_reference:
      - ai_assistants
      - workflow_thinking
    must_not_reteach:
      - remote_work_transformation
      - productivity_fragmentation
      - ai_assistants
